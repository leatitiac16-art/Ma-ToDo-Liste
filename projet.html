<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Projet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <button id="btn-retour">Retour</button>
        <div class="projet-header" id="projet-header">
            <h1 id="titre-projet">Nom du Projet</h1>
            <p id="desc-projet-page">Description du projet...</p>
            <p class="projet-dates" id="dates-projet">Date début → Date fin</p>
        </div>

        <div class="cercle-progression">
            <div class="cercle" id="cercle-projet">0%</div>
            <p>Progression du projet</p>
        </div>

        <button id="btn-ajouter-tache-projet">Créer une tâche</button>

        <ul id="liste-taches-projet"></ul>
    </div>

    <script src="projet.js"></script>
</body>
</html>
